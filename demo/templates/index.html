<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP2 Trajectory Predictor Demo</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        h1 { margin: 0; font-weight: 800; letter-spacing: -0.025em; font-size: 2.5rem; }
        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            max-width: 1200px;
            width: 95%;
            margin-top: 2rem;
            padding-bottom: 4rem;
        }
        .sidebar {
            background-color: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            height: fit-content;
        }
        .main-content {
            background-color: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #94a3b8; }
        select, input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 1rem;
            border-radius: 0.5rem;
            border: none;
            background-color: var(--accent);
            color: #0f172a;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background-color: var(--accent-hover); transform: translateY(-1px); }
        #heatmap {
            max-width: 100%;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .slider-container { display: flex; align-items: center; gap: 1rem; }
        #time-val { font-weight: 800; color: var(--accent); min-width: 3rem; }
        .loader {
            border: 4px solid #334155;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <h1>LP2 Trajectory Predictor</h1>
        <p style="color: #94a3b8;">LLM-Guided Probabilistic Indoor Navigation</p>
    </header>

    <div class="container">
        <div class="sidebar">
            <div class="form-group">
                <label>Select Scene</label>
                <select id="scene">
                    <option value="4acaebcc-6c10-2a2a-858b-29c7e4fb410d">Scene A (Living Room)</option>
                    <option value="754e884c-ea24-2175-8b34-cead19d4198d">Scene B (Evaluation)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Past Interactions (labels)</label>
                <input type="text" id="history" placeholder="e.g. sofa, tv, cushion">
            </div>
            <div class="form-group">
                <label>Persona</label>
                <select id="persona">
                    <option value="relaxer">Relaxer</option>
                    <option value="worker">Worker</option>
                </select>
            </div>
            <div class="form-group">
                <label>Horizon (seconds)</label>
                <div class="slider-container">
                    <input type="range" id="t" min="0" max="60" value="30" step="5">
                    <span id="time-val">30s</span>
                </div>
            </div>
            <button id="predict-btn">Generate Prediction</button>
        </div>

        <div class="main-content">
            <div id="loader" class="loader"></div>
            <img id="heatmap" src="" alt="Heatmap will appear here" style="display: none;">
            <div id="stats" style="margin-top: 1rem; color: #94a3b8; font-size: 0.9rem;"></div>
        </div>
    </div>

    <script>
        const tSlider = document.getElementById('t');
        const tVal = document.getElementById('time-val');
        tSlider.oninput = () => tVal.innerText = tSlider.value + 's';

        document.getElementById('predict-btn').onclick = async () => {
            const btn = document.getElementById('predict-btn');
            const loader = document.getElementById('loader');
            const img = document.getElementById('heatmap');
            const stats = document.getElementById('stats');

            btn.disabled = true;
            loader.style.display = 'block';
            img.style.display = 'none';

            try {
                const historyStr = document.getElementById('history').value;
                const past_labels = historyStr ? historyStr.split(',').map(s => s.trim()) : [];
                
                const resp = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        scene_id: document.getElementById('scene').value,
                        persona: document.getElementById('persona').value,
                        past_labels: past_labels,
                        t: tSlider.value
                    })
                });
                const data = await resp.json();
                img.src = 'data:image/png;base64,' + data.image;
                img.style.display = 'block';
                stats.innerText = `Entropy: ${data.entropy.toFixed(4)}`;
            } catch (e) {
                alert('Prediction failed. Check if server and Ollama are running.');
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        };
    </script>
</body>
</html>
